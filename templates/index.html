
<!DOCTYPE html>
<html>
<head>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<h3>Verifying...</h3>
<button id="b" style="display:none;">Open</button>
<script>
let key=new URLSearchParams(location.search).get("key");
setTimeout(()=>{b.style.display="block"},1500);
b.onclick=()=>location="/redirect/"+key;
</script>
</body>
</html>
